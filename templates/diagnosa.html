{% extends 'base.html' %}
{% block title %}Form Diagnosa{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-8">
  <div class="inline-flex items-center justify-center w-12 h-12 bg-yellow-100 rounded-xl">
    <svg class="w-6 h-6 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
    </svg>
  </div>
  <h2 class="text-3xl font-bold text-gray-900">Form Diagnosa Penyakit Sapi</h2>
</div>

<form method="post" x-data="{ dipilih: [], cari: '' }">
  {% csrf_token %}

  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 mb-6">
    <div class="flex items-center gap-2 mb-6">
      <svg class="w-5 h-5 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
      </svg>
      <h3 class="font-bold text-gray-900 text-lg">Data Pemilik</h3>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          Nama Pemilik <span class="text-red-500">*</span>
        </label>
        <input type="text" name="nama_pemilik" required placeholder="Masukkan nama pemilik"
               class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-yellow-400 transition">
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          Nama / ID Sapi <span class="text-gray-400 font-normal">(opsional)</span>
        </label>
        <input type="text" name="nama_sapi" placeholder="Contoh: Sapi 01"
               class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-yellow-400 transition">
      </div>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 mb-6">
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-2">
        <svg class="w-5 h-5 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
        </svg>
        <h3 class="font-bold text-gray-900 text-lg">Pilih Gejala yang Dialami Sapi</h3>
      </div>
      <div class="flex items-center gap-2 bg-yellow-50 px-4 py-2 rounded-full">
        <svg class="w-4 h-4 text-yellow-600" fill="currentColor" viewBox="0 0 20 20">
          <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z" />
          <path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd" />
        </svg>
        <span class="text-sm font-semibold text-yellow-800">
          <span x-text="dipilih.length"></span> dipilih
        </span>
      </div>
    </div>

    <div class="relative mb-5">
      <svg class="absolute left-4 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
      <input type="text" x-model="cari" placeholder="Cari gejala..."
             class="w-full border border-gray-300 rounded-xl pl-12 pr-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-yellow-400 transition">
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-96 overflow-y-auto pr-2">
      {% for g in gejala_list %}
        <label x-show="'{{ g.nama|lower }}'.includes(cari.toLowerCase())"
               :class="dipilih.includes({{ g.id }}) ? 'border-yellow-400 bg-yellow-50 shadow-sm' : 'border-gray-200 hover:border-gray-300'"
               class="flex items-start gap-3 border rounded-xl p-4 cursor-pointer transition">
          <input type="checkbox" name="gejala" value="{{ g.id }}"
                 x-model="dipilih" :value="{{ g.id }}"
                 class="mt-0.5 w-4 h-4 accent-yellow-500 cursor-pointer">
          <span class="text-sm text-gray-700 leading-relaxed">
            <span class="inline-block font-mono text-xs font-semibold text-yellow-600 bg-yellow-100 px-2 py-0.5 rounded">{{ g.kode }}</span>
            <span class="ml-1">{{ g.nama }}</span>
          </span>
        </label>
      {% endfor %}
    </div>
  </div>

  <div class="flex gap-4">
    <button type="submit"
            :disabled="dipilih.length === 0"
            :class="dipilih.length === 0 ? 'opacity-50 cursor-not-allowed bg-yellow-500' : 'bg-yellow-500 hover:bg-yellow-600 shadow-lg shadow-yellow-200 hover:shadow-xl'"
            class="text-white font-bold px-8 py-3.5 rounded-xl transition flex items-center gap-2">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
      </svg>
      Proses Diagnosa
    </button>
    <a href="{% url 'home' %}" class="border-2 border-gray-300 text-gray-700 font-semibold px-8 py-3.5 rounded-xl hover:bg-gray-50 transition flex items-center gap-2">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
      Batal
    </a>
  </div>
</form>
{% endblock %}
